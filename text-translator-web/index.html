<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgeTranslate | Fullstack Translator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <i class="fa-solid fa-language"></i> <span>BridgeTranslate</span>
        </div>
        <nav>
            <span class="badge">v1.0 - Java Spring & JS</span>
        </nav>
    </header>

    <main class="app-container">
        <section class="translator-box">
            <header class="box-header">
                <select id="source-lang">
                    <option value="AUTO">Detectar Idioma</option>
                    <option value="PT_BR">Português</option>
                    <option value="EN">Inglês</option>
                    <option value="ES">Espanhol</option>
                </select>
                <button type="button" class="btn-audio" id="btn-listen-source" title="Ouvir original">
                    <i class="fas fa-volume-up"></i>
                </button>
            </header>
            <textarea id="input-text" placeholder="Digite aqui..." maxlength="5000"></textarea>
        </section>

        <div class="middle-column">
            <button type="button" id="btn-switch" title="Inverter Idiomas">
                <i class="fas fa-exchange-alt"></i>
            </button>
        </div>

        <section class="translator-box">
            <header class="box-header">
                <select id="target-lang">
                    <option value="EN">Inglês</option>
                    <option value="PT_BR">Português</option>
                    <option value="ES">Espanhol</option>
                </select>
                <div class="header-actions">
                    <div id="loader" class="loader-container">
                        <div class="dot-flashing"></div>
                    </div>
                    <button type="button" class="btn-audio" id="btn-copy-target" title="Copiar tradução">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button type="button" class="btn-audio" id="btn-listen-target" title="Ouvir tradução">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </header>
            <textarea id="output-text" placeholder="..." readonly></textarea>
        </section>
    </main>

    <footer class="main-footer">
        <p>Built by <strong>Thomaz Collet</strong></p>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/thomaz-collet" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/ThomazCollet" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
