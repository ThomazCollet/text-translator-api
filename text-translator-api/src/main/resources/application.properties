spring.application.name=text-translator-api

# Integração LibreTranslate (Local via Docker e Backup)
translation.api.url=${LIBRETRANSLATE_URL:http://localhost:5000/translate}
translation.api.backup-url=https://libretranslate.com/translate

# Integração VoiceRSS (Recomendado usar variável de ambiente para a KEY)
voicerss.api.key=${VOICERSS_KEY:c8adaa59feec400dbeee5251777f1ec7}
voicerss.api.url=https://api.voicerss.org/

# Configuração Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ATENÇÃO: Mudança para ativar o Redis Cache
# Use 'redis' para produção/docker e 'simple' apenas se quiser rodar sem Redis.
spring.cache.type=redis